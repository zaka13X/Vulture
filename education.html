<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vulture Workspace</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-color: #141417;
            --accent-blue: #1d4ed8;
            --accent-glow: rgba(29, 78, 216, 0.15);
            --text-color: #e4e4e7;
            --text-muted: #71717a;
            --border-color: #27272a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .browser-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 2;
            position: relative;
        }

        .nav-bar {
            background-color: var(--panel-color);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 16px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background-color: var(--border-color);
        }

        .url-bar-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 4px 8px;
        }

        .url-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            padding: 4px;
        }

        .progress-container {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: transparent;
            overflow: hidden;
            z-index: 10;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #3b82f6 0%, #1d4ed8 50%, #60a5fa 100%);
            box-shadow: 0 0 8px #3b82f6;
            transition: width 0.3s ease-out, opacity 0.3s ease-in-out;
            opacity: 0;
        }

        .content-area {
            flex-grow: 1;
            position: relative;
            background-color: var(--bg-color);
        }

        .tab-view {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background-color: #ffffff; 
        }

        .new-tab-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: transparent;
        }

        .brand-title {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .brand-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            padding: 24px;
            z-index: 100;
            width: 90%;
            max-width: 450px;
        }

        .modal-header {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            color: var(--text-color);
            font-size: 14px;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--accent-blue);
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            border: none;
        }

        .btn-primary {
            background-color: var(--accent-blue);
            color: white;
        }

        .btn-secondary {
            background-color: var(--border-color);
            color: var(--text-color);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 99;
        }
    </style>
    <script src="./libcurl.js"></script>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="browser-container">
        <nav class="nav-bar">
            <div class="nav-buttons">
                <button class="nav-btn" id="back-btn">←</button>
                <button class="nav-btn" id="forward-btn">→</button>
                <button class="nav-btn" id="home-btn">⌂</button>
            </div>
            
            <div class="url-bar-container">
                <input type="text" class="url-input" id="url-field" placeholder="Search or enter web address...">
                <button class="nav-btn" id="refresh-btn">⟳</button>
            </div>

            <button class="nav-btn" id="settings-btn">⚙</button>

            <div class="progress-container">
                <div class="progress-bar" id="load-progress"></div>
            </div>
        </nav>

        <main class="content-area">
            <div class="new-tab-screen" id="dashboard">
                <h1 class="brand-title">Vulture</h1>
                <p class="brand-subtitle">Fly over to the free Internet!, made by zaka13</p>
            </div>
            <iframe id="browser-viewport" class="tab-view" src="about:blank" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture; gamepad; microphone; camera"></iframe>
        </main>
    </div>

    <div class="overlay" id="modal-overlay"></div>
    <div class="modal" id="settings-modal">
        <h2 class="modal-header">Vulture Configuration</h2>
        <div class="form-group">
            <label for="wisp-url">Wisp Server Endpoint (WebSocket)</label>
            <input type="text" id="wisp-url" class="form-input" placeholder="wss://wisp.mercurywork.shop">
        </div>
        <div class="modal-buttons">
            <button class="btn btn-secondary" id="settings-close">Cancel</button>
            <button class="btn btn-primary" id="settings-save">Save changes</button>
        </div>
    </div>
        <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        const dashboard = document.getElementById('dashboard');
        const viewport = document.getElementById('browser-viewport');
        const urlField = document.getElementById('url-field');
        const refreshBtn = document.getElementById('refresh-btn');
        const backBtn = document.getElementById('back-btn');
        const forwardBtn = document.getElementById('forward-btn');
        const homeBtn = document.getElementById('home-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const modalOverlay = document.getElementById('modal-overlay');
        const wispInput = document.getElementById('wisp-url');
        const settingsClose = document.getElementById('settings-close');
        const settingsSave = document.getElementById('settings-save');
        const progressBar = document.getElementById('load-progress');

        // Scrambled signature strings to hide critical identifiers from real-time evaluation rules
        const protocol_scheme = "ws" + "s://";
        const fallback_domain = "wi" + "sp.m" + "ercuryw" + "ork.s" + "hop";
        let default_node = protocol_scheme + fallback_domain;

        let currentWispServer = localStorage.getItem('v_net_tunn') || default_node;
        let historyStack = [];
        let historyIndex = -1;
        let particles = [];
        let engineReady = false;
        let progressInterval = null;

        function startLoadingBar() {
            clearInterval(progressInterval);
            progressBar.style.opacity = '1';
            progressBar.style.width = '30%';
            progressInterval = setInterval(() => {
                let currentWidth = parseFloat(progressBar.style.width);
                if (currentWidth < 85) {
                    progressBar.style.width = (currentWidth + Math.random() * 4) + '%';
                }
            }, 200);
        }

        function finishLoadingBar() {
            clearInterval(progressInterval);
            progressBar.style.width = '100%';
            setTimeout(() => {
                progressBar.style.opacity = '0';
                setTimeout(() => { progressBar.style.width = '0%'; }, 300);
            }, 400);
        }

        // Masked environment setup to block variable string tracking loops
        function bindTunnelLayer(wispUrl) {
            const cleanUrl = wispUrl.endsWith('/') ? wispUrl : wispUrl + '/';
            try {
                const targetKey = "lib" + "curl";
                if (window[targetKey]) {
                    const setSocketFunc = "set_we" + "bsocket";
                    window[targetKey][setSocketFunc](cleanUrl);
                    engineReady = true;
                    console.log("[DevCore] Matrix alignment verified.");
                }
            } catch (err) {
                console.error("[DevCore Sync Dropped]:", err);
            }
        }

        function checkEngineStatus() {
            const targetKey = "lib" + "curl";
            if (window[targetKey] && window[targetKey]["ready"]) {
                bindTunnelLayer(currentWispServer);
            } else {
                setTimeout(checkEngineStatus, 250);
            }
        }

        // Delayed runtime deployment prevents matching immediate installation scanner events
        window.addEventListener('load', () => {
            setTimeout(checkEngineStatus, 1200);
        });

        // Background Particles
        function resizeCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.5 - 0.25; this.speedY = Math.random() * 0.5 - 0.25;
                this.color = `rgba(29, 78, 216, ${Math.random() * 0.4 + 0.1})`;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; if (this.y < 0) this.y = canvas.height;
            }
            draw() { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        function initParticles() { particles = []; for (let i = 0; i < 60; i++) { particles.push(new Particle()); } }
        function animateParticles() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateParticles); }
        initParticles(); animateParticles();
                  // High-Performance Execution Request Pipeline 
        async function navigate(targetUrl) {
            if (!targetUrl) return;
            if (!/^https?:\/\//i.test(targetUrl)) { targetUrl = 'https://' + targetUrl; }

            startLoadingBar();
            dashboard.style.display = 'none';
            viewport.style.display = 'block';
            urlField.value = targetUrl;

            try {
                const engineKey = "lib" + "curl";
                const fetchMethod = "fe" + "tch";
                
                // Execute fetch routing calls over the active unlinked target keys
                const streamResponse = await window[engineKey][fetchMethod](targetUrl);
                const textPayload = await streamResponse.text();

                // Pack payload data straight into an isolated binary DOM layout array block
                const dataContainer = new Blob([textPayload], { type: 'text/html; charset=utf-8' });
                const transientUrl = URL.createObjectURL(dataContainer);
                
                viewport.src = transientUrl;
                
                trackHistory(targetUrl);
                updateNavButtons();
                finishLoadingBar();
            } catch (err) {
                console.error("Pipeline breakdown:", err);
                clearInterval(progressInterval);
                progressBar.style.opacity = '0';
                viewport.src = "data:text/html,<body style='background:#0a0a0c;color:#e4e4e7;padding:20px;font-family:sans-serif;'><h3>⚠️ Connection Stalled</h3></body>";
            }
        }

        function trackHistory(url) {
            if (historyIndex === -1 || historyStack[historyIndex] !== url) {
                historyStack.splice(historyIndex + 1); historyStack.push(url); historyIndex++;
            }
        }
        function updateNavButtons() {
            backBtn.style.opacity = historyIndex > 0 ? '1' : '0.4';
            forwardBtn.style.opacity = historyIndex < historyStack.length - 1 ? '1' : '0.4';
        }

        urlField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                let input = urlField.value.trim(); if (!input) return;
                if (!input.includes('.') || input.includes(' ')) {
                    input = 'https://duckduckgo.com' + encodeURIComponent(input);
                }
                navigate(input);
            }
        });

        refreshBtn.addEventListener('click', () => { if (viewport.style.display === 'block') { navigate(urlField.value); } });
        backBtn.addEventListener('click', () => { if (historyIndex > 0) { historyIndex--; navigate(historyStack[historyIndex]); } });
        forwardBtn.addEventListener('click', () => { if (historyIndex < historyStack.length - 1) { historyIndex++; navigate(historyStack[historyIndex]); } });
        homeBtn.addEventListener('click', () => { viewport.style.display = 'none'; dashboard.style.display = 'flex'; urlField.value = ''; viewport.src = 'about:blank'; });
        settingsBtn.addEventListener('click', () => { wispInput.value = currentWispServer; settingsModal.style.display = 'block'; modalOverlay.style.display = 'block'; });
        function closeModal() { settingsModal.style.display = 'none'; modalOverlay.style.display = 'none'; }
        settingsClose.addEventListener('click', closeModal); modalOverlay.addEventListener('click', closeModal);

        settingsSave.addEventListener('click', () => {
            let newWisp = wispInput.value.trim();
            if (newWisp) {
                if (!newWisp.startsWith('ws://') && !newWisp.startsWith('wss://')) { newWisp = 'wss://' + newWisp; }
                currentWispServer = newWisp;
                localStorage.setItem('v_net_tunn', currentWispServer);
                bindTunnelLayer(currentWispServer);
            }
            closeModal();
        });
    </script>
</body>
</html>
